# ──────────────────────────────────────────────────────────────────────────────
# tsbm — benchmark configuration
#
# Quick-start dataset generation:
#
#   Small  (~100 K rows, quick smoke-test):
#     tsbm generate --devices 100 --readings 1000 \
#                   --output datasets/small_iot.parquet
#
#   Medium (~11 M rows, realistic IoT fleet):
#     tsbm generate --devices 5000 --readings 2200 \
#                   --output datasets/11m.parquet
#
#   Large  (~100 M rows, stress / capacity test):
#     tsbm generate --devices 10000 --readings 10000 \
#                   --output datasets/100m.parquet
#
# Then run all benchmarks in one command:
#   tsbm run --benchmark all --dataset datasets/11m.parquet
#   tsbm run --benchmark all --dataset datasets/100m.parquet
# ──────────────────────────────────────────────────────────────────────────────

# ── Databases ─────────────────────────────────────────────────────────────────

[databases.questdb]
enabled      = true
host         = "localhost"
ilp_port     = 5001
pg_port      = 8812
# Table partition granularity.  Valid values: HOUR, DAY, WEEK, MONTH, YEAR.
# Use HOUR for dense datasets (millions of rows per day) or high-frequency
# time-range queries on short windows.  DAY is the safe default.
partition_by = "HOUR"

[databases.cratedb]
enabled   = true
host      = "localhost"
http_port = 4200
pg_port   = 5432

[databases.timescaledb]
enabled              = true
host                 = "localhost"
pg_port              = 5433       # host-mapped port — Docker maps 5433 → 5432 inside the container
user                 = "postgres"
password             = "postgres"
dbname               = "tsbm"
# Hypertable chunk interval passed to create_hypertable().
# Use "1 day" for high-frequency data (millions of rows per day).
# "7 days" is the safe default for sparser datasets.
chunk_time_interval  = "7 days"

# ── Workload ──────────────────────────────────────────────────────────────────

[workload]

# Dataset file used by all benchmarks unless overridden with --dataset.
# Change this to point at your pre-generated Parquet file.
dataset = "datasets/40m.parquet"

# Multiple dataset sources (concatenated in order during seeding).
# When set, these take priority over the single `dataset` field above.
# Each entry can be a local path, directory, glob pattern, or Azure Blob URL.
#
# Local folder — all .parquet/.parq files discovered recursively:
#   datasets = ["datasets/parts/"]
#
# Azure container — all Parquet files in the container discovered automatically:
#   datasets = ["az://myblobcontainer/"]
#   datasets = ["az://myblobcontainer/data/sensors/"]
#
# Mix of sources (specific files, folders, globs, and Azure URLs):
#   datasets = [
#       "datasets/part1.parquet",
#       "datasets/parts/",
#       "datasets/extra/*.parquet",
#       "az://myblobcontainer/data/sensors_2024.parquet",
#       "az://myblobcontainer/data/2025/",
#       "https://myaccount.blob.core.windows.net/data/sensors_2025.parquet",
#   ]
#
# Azure authentication (used when any dataset entry is an Azure URL).
# Priority: connection_string > sas_token > DefaultAzureCredential (auto).
# azure_storage_connection_string = ""
# azure_storage_sas_token = ""

# ── Ingestion batch sweep ──────────────────────────────────────────────────────
# Each batch_size value is tested independently during ingestion benchmarks.
# Larger batches amortise per-call overhead; very small batches stress the
# commit/WAL path.  Batch sizes larger than the dataset are capped automatically.
#
# Scale guide (pick the section that matches your dataset):
#
#   ~100 K rows (quick smoke-test):
#     batch_sizes = [1_000, 10_000, 50_000]
#     workers     = [1, 4, 8]
#     warmup_iterations  = 3
#     measurement_rounds = 10
#
#   ~11 M rows (standard IoT fleet):
#     batch_sizes = [10_000, 100_000, 500_000]
#     workers     = [1, 4, 8]
#     warmup_iterations  = 3
#     measurement_rounds = 10
#
#   ~40 M rows (current test — configured below):
#     batch_sizes = [50_000, 500_000, 2_000_000]
#     workers     = [1, 2, 4]
#     warmup_iterations  = 2
#     measurement_rounds = 5
#
#   ~100 M rows (stress / capacity test):
#     batch_sizes = [100_000, 1_000_000, 5_000_000]
#     workers     = [1, 2, 4]
#     warmup_iterations  = 1
#     measurement_rounds = 3
#
# Memory budget: workers × batch_size × ~70 bytes live in RAM simultaneously.
#   4 workers × 2 M rows × 70 bytes ≈ 560 MB  ← safe on 8 GB machines
#   4 workers × 5 M rows × 70 bytes ≈ 1.4 GB  ← safe on 16 GB machines
batch_sizes = [50_000, 500_000, 2_000_000]

# Concurrency level swept across all benchmarks:
#   Ingestion        — N concurrent writer tasks per batch
#   Query benchmarks — N concurrent client queries per measurement round
#   Mixed            — N concurrent reader coroutines (writer is always 1)
workers = [1, 4, 8, 16]

# Warmup iterations executed (and discarded) before measurement begins.
warmup_iterations = 2

# Measurement rounds per (batch_size × workers) combination.
# 5 rounds gives stable p50/p95/p99 statistics for large datasets.
measurement_rounds = 5

# Time windows used by the query benchmarks (time_range, aggregation, etc.).
# Each window is benchmarked independently, producing per-window results.
# For sparse datasets (few rows per minute), narrow windows scan fewer rows
# and finish faster; wide windows stress sequential scan performance.
time_windows = ["1min", "1h", "1day", "1week"]

# Seed for reproducible random time-window generation.
prng_seed = 42

# Duration of the mixed (concurrent read + write) benchmark.
mixed_duration_seconds = 60

# Whether to truncate the table between every measurement round.
# false = rows accumulate (tests write-under-load — recommended for large datasets);
# true  = isolated fresh-table measurement (more reproducible but much slower overall
#          because the full dataset is re-loaded before every round).
reset_between_rounds = false

# ── Streaming ─────────────────────────────────────────────────────────────────
# Datasets exceeding this row count are fed to the database chunk-by-chunk
# rather than loading the whole file into RAM at once.
# Query benchmarks read only the timestamp column for window generation
# (not the full table), so peak memory during query runs is kept low.
#
# Rule of thumb:
#   8 GB  machine → 500_000   (each 100 K chunk ≈ 7 MB @ 70 bytes/row)
#   16 GB machine → 2_000_000
#   32 GB machine → 5_000_000
streaming_threshold_rows = 500_000

# Rows per streaming chunk.
# Larger = fewer round-trips, better ingestion throughput, more RAM per chunk.
# At ~70 bytes/row:
#   100_000 rows ≈  7 MB per chunk
#   500_000 rows ≈ 35 MB per chunk
chunk_size = 500_000

# ── Timestamp column override ─────────────────────────────────────────────────
# By default the timestamp column is auto-detected by name (time, ts, timestamp,
# datetime, date, created_at, event_time) or by PyArrow type.
# Set this when your dataset uses a different column name (e.g. "recorded_at").
# Can also be overridden at runtime with:  tsbm run --timestamp-col my_col
#
# timestamp_col = "recorded_at"

# ── Query column overrides ────────────────────────────────────────────────────
# By default every aggregation and GROUP BY uses the first metric / tag column
# in the dataset schema.  If your dataset has an ID or non-numeric column at
# position 0, override these to point at the column you actually want to measure.
#
# Examples:
#   agg_metric_col   = "temperature"   # AVG/MIN/MAX this column
#   group_by_tag_col = "device_id"     # GROUP BY / PARTITION BY this column
#
# Leave commented out to use the auto-detected first column.
# agg_metric_col   = ""
# group_by_tag_col = ""

# ── Materialized views ────────────────────────────────────────────────────────

# Time granularity for materialized view / continuous aggregate creation.
mv_granularity = "1 hour"

# Rounds of late-arriving data ingestion (late_arrival benchmark).
late_arrival_rounds = 10

# Rows per late-arrival batch — should be small relative to the main dataset
# but large enough to trigger a real MV refresh.
late_arrival_batch_size = 10_000

# ── Ingestion pre-seed (optional) ─────────────────────────────────────────────
# When > 0, this many rows are inserted after the warmup phase and before the
# first measurement round, so writes happen into an already-populated table.
# This simulates real-world production writes where historical data, indexes,
# and WAL segments are already present.
#
# Tuning guide:
#   0               → clean-table baseline (default)
#   ~10 % of dataset → mild pre-warm; indexes and partitions are established
#   ~50 % of dataset → half-full table; tests compaction and index growth costs
#
# Note: has no effect when reset_between_rounds = true, because the table is
# dropped at the start of each measurement round, wiping the seed rows.
ingestion_seed_rows = 0

# ── Results storage ───────────────────────────────────────────────────────────

[results]
sqlite_path = "results/runs.db"
parquet_dir = "results/parquet"

# ── Resource monitor ──────────────────────────────────────────────────────────

[monitor]
enabled     = true
interval_ms = 500   # CPU / RSS sampling interval in milliseconds

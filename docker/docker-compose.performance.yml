###############################################################################
# TSBench — Performance-Tuned Docker Compose
#
# Optimised for a DEDICATED benchmark machine.
# Do NOT use on a shared host — memory limits are tuned for exclusive use.
#
# Default target: 16 cores / 32 GB RAM
# Each setting has a comment showing what to change for larger machines:
#   "# → 16c/64GB"  and  "# → 32c/128GB"
#
# Prerequisites (run once on the VM):
#   sudo bash scripts/setup-perf-vm.sh            # creates /data dirs, kernel tuning
#   — or automatically via: bash scripts/quickstart.sh --perf
#
# Usage:
#   docker compose -f docker/docker-compose.performance.yml up -d
#   docker compose -f docker/docker-compose.performance.yml down
#   sudo rm -rf /data/{questdb,cratedb,timescaledb}/*   # wipe data
#
# Port mappings match docker-compose.yml so benchmark.toml needs no changes:
#   QuestDB:     5001:9000  (ILP HTTP)
#                8812:8812  (PGWire)
#   CrateDB:     4200:4200  (HTTP / Admin UI)
#                5432:5432  (PGWire)
#   TimescaleDB: 5433:5432
###############################################################################

services:

  # ---------------------------------------------------------------------------
  # QuestDB
  #
  # Key levers:
  #   QDB_SHARED_WORKER_COUNT
  #     Background I/O, WAL application, and compaction workers.
  #     Set to physical core count — one worker per core saturates I/O without
  #     context-switching overhead.
  #
  #   QDB_CAIRO_SQL_PARALLEL_FILTER_WORKER_COUNT
  #     Worker threads used to evaluate WHERE filters in parallel across
  #     partitions.  Set to core count so every concurrent query can use
  #     the full machine when it runs alone.
  #
  #   QDB_CAIRO_SQL_PARALLEL_GROUPBY_ENABLED
  #     Enables SIMD-vectorised parallel GROUP BY / SAMPLE BY aggregation.
  #     This is the single biggest win for aggregation benchmarks — each
  #     partition is aggregated on a separate thread and results merged.
  #
  #   QDB_CAIRO_MAX_UNCOMMITTED_ROWS
  #     Rows buffered in the WAL commit queue before a forced flush.
  #     Higher values batch more rows per commit, reducing write overhead
  #     during bulk ingestion.  Uses RAM proportional to row size (~70 B/row).
  #
  #   QDB_LINE_HTTP_RECV_BUFFER_SIZE
  #     Socket receive buffer for ILP over HTTP.  Must be large enough to
  #     hold one full batch without fragmenting across multiple reads.
  # ---------------------------------------------------------------------------
  questdb:
    image: questdb/questdb:latest
    container_name: tsbench_perf_questdb
    restart: unless-stopped
    ports:
      - "5001:9000"   # ILP HTTP
      - "8812:8812"   # PGWire
    environment:
      QDB_HTTP_ENABLED: "true"

      # Java heap — explicit limit prevents OOM on large ingestion workloads.
      # QuestDB Docker uses JVM_PREPEND (not JAVA_OPTS) to pass JVM flags.
      # Rule: ~25% of total RAM when sharing with other databases.
      # QuestDB also uses significant off-heap memory (mmap, direct buffers)
      # so the container limit must be higher than -Xmx.
      JVM_PREPEND: "-Xmx8g -Xms4g"                        # → 16c/64GB: -Xmx16g -Xms8g  → 32c/128GB: -Xmx32g -Xms16g

      # Parallelism — match physical core count
      QDB_SHARED_WORKER_COUNT: "16"                        # → 32c: 32
      QDB_CAIRO_SQL_PARALLEL_FILTER_WORKER_COUNT: "16"     # → 32c: 32
      QDB_CAIRO_SQL_PARALLEL_GROUPBY_ENABLED: "true"

      # Write path — 2 M rows buffered before commit (~140 MB at 70 B/row)
      # Increased from 1M to improve ingestion throughput; fits in 8g heap.
      QDB_CAIRO_MAX_UNCOMMITTED_ROWS: "2000000"            # → 16c/64GB: 4000000  → 32c/128GB: 8000000

      # ── WAL tuning ──────────────────────────────────────────────────────
      # Time budget (µs) the shared workers spend applying WAL per table
      # per iteration.  Higher = WAL drains faster but delays other tables.
      QDB_CAIRO_WAL_APPLY_TABLE_TIME_QUOTA: "500000"       # 500 ms  → 32c/128GB: 1000000

      # Rows per WAL segment before rolling to a new file.
      # Larger segments = fewer fsyncs but bigger recovery replay.
      QDB_CAIRO_WAL_SEGMENT_ROLLOVER_ROW_COUNT: "500000"   # → 16c/64GB: 1000000  → 32c/128GB: 2000000

      # Interval (ms) between WAL purge sweeps that reclaim applied segments.
      # Faster purge keeps disk usage low during sustained ingestion.
      QDB_CAIRO_WAL_PURGE_INTERVAL: "5000"                 # 5 s (default 30 s)

      # Out-of-order commit lag (µs).  Rows arriving out-of-order within
      # this window are merged in memory rather than triggering O3 commits.
      # 60 s is safe for most time-series workloads with minor clock skew.
      QDB_CAIRO_O3_MAX_LAG: "60000000"                     # 60 s  → 32c/128GB: 120000000

      # Writer data page size — larger pages reduce mmap overhead during
      # sustained writes.  4 MB is optimal for bulk ingestion workloads.
      QDB_CAIRO_WRITER_DATA_APPEND_PAGE_SIZE: "4194304"    # 4 MB (default 1 MB)

      # Parallel WAL apply workers — match core count for maximum WAL drain speed.
      # Critical for 8B+ row ingestion to prevent WAL lag from stalling writers.
      QDB_WAL_APPLY_WORKER_COUNT: "16"                     # → 32c: 32  → 64c: 64

      # Column memory for O3 merges — larger reduces mmap churn during
      # out-of-order writes.  8 MB per column during O3 commit.
      QDB_CAIRO_O3_COLUMN_MEMORY_SIZE: "8388608"           # 8 MB (default 1 MB)

      # ── Network ─────────────────────────────────────────────────────────
      # 16 MB receive buffer handles large ILP batches in one read
      QDB_LINE_HTTP_RECV_BUFFER_SIZE: "16777216"           # 16 MB  → 16c/64GB: 32 MB (33554432)  → 32c/128GB: 64 MB

      # ILP HTTP worker threads — dedicated threads for ingestion pipeline.
      # Separate from HTTP_WORKER_COUNT (REST/console).  Match half the
      # core count so ingestion and queries don't starve each other.
      QDB_LINE_HTTP_WORKER_COUNT: "8"                      # → 32c: 16

      # HTTP handler threads for Web Console and REST queries
      QDB_HTTP_WORKER_COUNT: "8"                           # → 32c: 16
    volumes:
      - /data/questdb:/var/lib/questdb
    deploy:
      resources:
        limits:
          memory: 10g                                      # → 16c/64GB: 20g  → 32c/128GB: 40g
    ulimits:
      nofile:
        soft: 131072
        hard: 131072
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  # ---------------------------------------------------------------------------
  # CrateDB
  #
  # Key levers:
  #   CRATE_HEAP_SIZE
  #     JVM heap for CrateDB's Lucene index engine.  Rule: 50% of total RAM.
  #     Too small → frequent GC pauses that inflate p99/p99.9 latency.
  #     Too large → leaves no room for the OS page cache that CrateDB also
  #     relies on for mmap segment reads, hurting repeated-query performance.
  #
  #   indices.memory.index_buffer_size
  #     Write buffer for Lucene segment indexing.  Higher = faster ingestion
  #     and fewer segment merges, at the cost of heap usage.
  #     Keep below 25% of heap to avoid GC pressure.
  #
  #   index.number_of_shards
  #     Default shard count for new tables (set at CREATE TABLE time, cannot
  #     be changed later).  One shard per core is optimal for single-node
  #     setups: each shard is a self-contained Lucene index processed on one
  #     thread, so N shards saturate N cores in parallel for aggregations.
  #
  #   node.store.allow_mmap
  #     Memory-mapped I/O for Lucene segment reads.  Allows the OS page cache
  #     to serve hot data directly from RAM without copying to JVM heap.
  #     Dramatically faster for repeated queries on warm data.
  #
  #   threadpool.search.size / threadpool.write.size
  #     CrateDB thread-pool sizes for query execution and ingestion.
  #     Set to core count to saturate parallel workloads.
  # ---------------------------------------------------------------------------
  cratedb:
    image: crate:latest
    container_name: tsbench_perf_cratedb
    restart: unless-stopped
    ports:
      - "4200:4200"   # HTTP / Admin UI
      - "5432:5432"   # PGWire
    environment:
      # Heap — must fit within container memory limit.
      # On 32GB shared machines, 8g heap + 2g for OS cache = 10g container.
      CRATE_HEAP_SIZE: "8g"                                # → 16c/64GB: 16g  → 32c/128GB: 32g
    command: >
      crate
      -Cnetwork.host=0.0.0.0
      -Cdiscovery.type=single-node

      -Cnode.store.allow_mmap=true

      -Cindex.number_of_replicas=0
      -Cindex.number_of_shards=16                          # → 32c: 32

      -Cindices.memory.index_buffer_size=2048mb            # → 16c/64GB: 4096mb  → 32c/128GB: 8192mb

      -Ccluster.routing.allocation.disk.threshold_enabled=false

      -Cthreadpool.search.size=16                          # → 32c: 32
      -Cthreadpool.write.size=16                           # → 32c: 32
    volumes:
      - /data/cratedb:/data
    deploy:
      resources:
        limits:
          memory: 10g                                      # → 16c/64GB: 20g  → 32c/128GB: 40g
    ulimits:
      nofile:
        soft: 131072
        hard: 131072
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  # ---------------------------------------------------------------------------
  # TimescaleDB (PostgreSQL)
  #
  # Key levers:
  #   shared_buffers
  #     PostgreSQL's hot-data cache in shared memory.  Rule: 25% of RAM.
  #     Chunks accessed repeatedly are served from RAM instead of disk.
  #     This is the single most impactful setting — raising it from the
  #     default 128 MB to 25% of RAM typically halves query latency.
  #
  #   effective_cache_size
  #     Planner hint: total RAM available for caching (shared_buffers +
  #     OS page cache combined).  Rule: 75% of RAM.  Does NOT allocate
  #     memory — it tells the planner to prefer index scans over seq scans.
  #
  #   work_mem
  #     Memory per sort or hash-aggregate operation inside a single query.
  #     Each parallel worker gets its own slice, so peak usage can reach:
  #       connections × workers_per_query × work_mem
  #     512 MB is safe at 64 GB with 8 parallel workers per query.
  #
  #   max_parallel_workers_per_gather
  #     Parallel workers spawned per query.  Rule: core_count / 2 so two
  #     concurrent queries can each use half the CPU without fighting.
  #     At 16 cores → 8 workers/query; both cores fully used with 2 clients.
  #
  #   max_parallel_workers
  #     Hard cap on total parallel workers across all queries.  Set to
  #     core count so the machine is never over-subscribed.
  #
  #   enable_partitionwise_aggregate
  #     CRITICAL for TimescaleDB.  Each hypertable chunk is aggregated
  #     independently in a parallel worker, then results are merged.
  #     Without this flag PostgreSQL aggregates all chunks on a single
  #     thread after gathering raw rows — useless for time-series workloads.
  #
  #   jit
  #     PostgreSQL JIT compilation.  Helps long-running analytical queries
  #     but adds compilation overhead that hurts short TSDB queries running
  #     under concurrent load.  Disable for benchmark workloads.
  #
  #   random_page_cost
  #     Cost model for random disk reads.  Default is 4.0 (spinning disk).
  #     Set to 1.1 when data fits in RAM or on NVMe — tells the planner to
  #     prefer index scans and bitmap scans instead of sequential scans.
  #
  #   synchronous_commit
  #     Waits for WAL flush on every COMMIT when on.  Turning off risks
  #     losing ~200 ms of commits on a crash but is acceptable for
  #     benchmarks and gives a large ingestion throughput improvement.
  #
  #   timescaledb.max_background_workers
  #     TimescaleDB-specific workers for compression jobs, continuous
  #     aggregate refresh, and chunk maintenance tasks.  Should be higher
  #     than the default (8) on machines with many cores.
  #
  #   shm_size
  #     Docker's default shared memory is 64 MB.  PostgreSQL maps
  #     shared_buffers into /dev/shm — if shm_size < shared_buffers the
  #     container crashes at startup with a "could not resize shared memory
  #     segment" error.  Always set shm_size > shared_buffers.
  # ---------------------------------------------------------------------------
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: tsbench_perf_timescaledb
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tsbm
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    command: >
      postgres

      -c shared_buffers=6GB                                # → 16c/64GB: 16GB  → 32c/128GB: 32GB
      -c effective_cache_size=8GB                           # → 16c/64GB: 48GB  → 32c/128GB: 96GB
      -c work_mem=256MB                                    # → 16c/64GB: 512MB  → 32c/128GB: 1GB
      -c maintenance_work_mem=2GB                          # → 16c/64GB: 4GB  → 32c/128GB: 8GB

      -c max_parallel_workers_per_gather=8
      -c max_parallel_workers=16
      -c max_worker_processes=32

      -c enable_partitionwise_aggregate=on
      -c enable_partitionwise_join=on
      -c jit=off
      -c random_page_cost=1.1
      -c seq_page_cost=1.0
      -c default_statistics_target=500

      -c checkpoint_completion_target=0.9
      -c wal_buffers=64MB
      -c max_wal_size=4GB                                  # → 16c/64GB: 8GB  → 32c/128GB: 16GB
      -c min_wal_size=1GB                                  # → 16c/64GB: 2GB  → 32c/128GB: 4GB
      -c synchronous_commit=off
      -c bgwriter_lru_maxpages=200
      -c bgwriter_delay=50ms

      -c timescaledb.max_background_workers=32
    # shm_size must exceed shared_buffers — Docker default of 64 MB will crash.
    shm_size: '8gb'                                        # → 16c/64GB: 18gb  → 32c/128GB: 36gb
    volumes:
      - /data/timescaledb:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 10g                                      # → 16c/64GB: 20g  → 32c/128GB: 40g
    ulimits:
      nofile:
        soft: 131072
        hard: 131072
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tsbm"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

###############################################################################
# Host volume layout (bind-mounted from /data on the VM):
#
#   /data/questdb/       → QuestDB data + WAL segments
#   /data/cratedb/       → CrateDB Lucene segments
#   /data/timescaledb/   → TimescaleDB / PostgreSQL data
#
# Provision /data on a dedicated high-IOPS volume (NVMe recommended).
# Pre-create directories before first run:
#   sudo mkdir -p /data/{questdb,cratedb,timescaledb}
#   sudo chown -R 10001:10001 /data/questdb      # QuestDB UID
#   sudo chown -R 1000:1000   /data/cratedb       # CrateDB UID
#   sudo chown -R 999:999     /data/timescaledb   # PostgreSQL UID
#
# To wipe data:  sudo rm -rf /data/{questdb,cratedb,timescaledb}/*
###############################################################################

###############################################################################
# Scaling reference
#
#  Setting                             16c/32GB   16c/64GB   32c/128GB  64c/256GB
#  ────────────────────────────────────────────────────────────────────────────────
#  QuestDB Java heap (-Xmx)                8g        16g         32g        64g
#  QuestDB container memory limit         10g        20g         40g        80g
#  QuestDB shared worker count             16         16          32         64
#  QuestDB parallel filter workers         16         16          32         64
#  QuestDB HTTP workers                     8          8          16         32
#  QuestDB max uncommitted rows         2 000K     4 000K      8 000K    16 000K
#  QuestDB WAL apply time quota         500 ms     500 ms    1 000 ms   1 000 ms
#  QuestDB WAL apply workers               16         16          32         64
#  QuestDB WAL segment rollover rows   500 000  1 000 000   2 000 000  4 000 000
#  QuestDB WAL purge interval              5 s        5 s         5 s        5 s
#  QuestDB O3 max lag                     60 s       60 s       120 s      120 s
#  QuestDB O3 column memory size         8 MB       8 MB        8 MB       16 MB
#  QuestDB writer page size              4 MB       4 MB        4 MB        8 MB
#  QuestDB ILP recv buffer               16 MB      32 MB       64 MB     128 MB
#  QuestDB ILP HTTP workers                 8          8          16         32
#  ─────────────────────────────────────────────────────────────────────
#  CrateDB heap                            8g        16g         32g
#  CrateDB container memory limit         10g        20g         40g
#  CrateDB default shards                 16         16          32
#  CrateDB index buffer                 2048mb    4096mb      8192mb
#  CrateDB search/write threadpool         16         16          32
#  ─────────────────────────────────────────────────────────────────────
#  TimescaleDB shared_buffers             6GB       16GB         32GB
#  TimescaleDB effective_cache_size       8GB       48GB         96GB
#  TimescaleDB work_mem                 256MB      512MB          1GB
#  TimescaleDB maintenance_work_mem       2GB        4GB          8GB
#  TimescaleDB parallel workers/query       8          8           12
#  TimescaleDB max_parallel_workers       16         16           32
#  TimescaleDB max_worker_processes       32         32           64
#  TimescaleDB max_background_workers     32         32           64
#  TimescaleDB shm_size                  8gb        18gb         36gb
#  TimescaleDB container memory limit    10g         20g         40g
###############################################################################
